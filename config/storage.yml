test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

minio:
  service: S3
  access_key_id: <%= ENV.fetch("MINIO_ACCESS_KEY", "minio_admin") %>
  secret_access_key: <%= ENV.fetch("MINIO_SECRET_KEY", "minio_password") %>
  region: us-east-1
  bucket: <%= ENV.fetch("MINIO_BUCKET", "ct-events") %>
  endpoint: <%= ENV.fetch("MINIO_ENDPOINT", "http://localhost:9000") %>
  force_path_style: true

