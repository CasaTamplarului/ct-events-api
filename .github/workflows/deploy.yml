name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/ct-events/api:$IMAGE_TAG \
            -t $ECR_REGISTRY/ct-events/api:latest \
            .
          docker push $ECR_REGISTRY/ct-events/api:$IMAGE_TAG
          docker push $ECR_REGISTRY/ct-events/api:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ct-events-production \
            --service api \
            --force-new-deployment \
            --region eu-south-1
          aws ecs update-service \
            --cluster ct-events-production \
            --service worker \
            --force-new-deployment \
            --region eu-south-1
